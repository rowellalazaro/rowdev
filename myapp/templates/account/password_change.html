{% extends 'base.html' %}
{% block content %}

<div class="login-box">
    <h2 style="color:#003082; text-align:center; margin-bottom:20px;">Change Password</h2>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div style="margin-bottom:15px;">
                <label style="color:#003082; font-weight:bold; display:block; margin-bottom:5px;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    {% for error in field.errors %}
                        <p style="color:red; font-size:13px;">{{ error }}</p>
                    {% endfor %}
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn-login" style="width:100%; padding:12px; background:#003082; color:white; border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:10px;">Change Password</button>
    </form>

    <div style="text-align:center; margin-top:15px;">
        <a href="{% url 'settings' %}" style="color:#003082; font-weight:bold;">← Back to Settings</a>
    </div>
</div>

{% endblock %}
