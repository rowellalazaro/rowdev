{% load static %}
<!DOCTYPE html>
<html id="html-root">
<head>
    <title>Iramora</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fefefe;
            color: #1e3a5f;
        }

        body.dark { background: #1a2a3a !important; color: #d0e8f5 !important; }
        body.dark .navbar { background: #0f1f2e !important; border-bottom: 1px solid #0a1520 !important; }
        body.dark .logo { color: #7ec8e3 !important; }
        body.dark .card { background: #1e3448 !important; color: #ffffff !important; border: 1px solid #0f1f2e !important; }
        body.dark .card p, body.dark .card span, body.dark .card a,
        body.dark .card h1, body.dark .card h2, body.dark .card h3,
        body.dark .card h4, body.dark .card h5, body.dark .card small { color: #ffffff !important; }
        body.dark .side-menu { background: #0f1f2e !important; box-shadow: 4px 0 20px rgba(0,0,0,0.5) !important; }
        body.dark .side-menu a, body.dark .side-menu button { color: #d0e8f5 !important; border-bottom: 1px solid #1a2a3a !important; }
        body.dark .side-menu a:hover, body.dark .side-menu button:hover { background: #1e3448 !important; }
        body.dark .side-menu .logout-item { color: #ff6b6b !important; }
        body.dark .settings-box { background: #1e3448 !important; color: #d0e8f5 !important; }
        body.dark .settings-box h2 { color: #7ec8e3 !important; }
        body.dark .settings-section h4 { color: #7ec8e3 !important; }
        body.dark .settings-section { border-bottom: 1px solid #0f1f2e !important; }
        body.dark .save-btn { background: #1e3a52 !important; color: #7ec8e3 !important; }
        body.dark input[type="text"], body.dark input[type="password"],
        body.dark input[type="email"], body.dark textarea {
            background: #1a2a3a !important; color: #d0e8f5 !important; border: 1px solid #0f1f2e !important;
        }
        body.dark .container { color: #d0e8f5 !important; }
        body.dark .overlay { display: block !important; }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: #003082;
            border-bottom: 1px solid #7ec8e3;
            position: relative;
            z-index: 100;
        }

        .logo {
            font-family: sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── HAMBURGER ── */
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .hamburger:hover { background: rgba(255,255,255,0.15); }

        .hamburger span {
            display: block;
            width: 24px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: 0.3s;
        }

        /* ── OVERLAY ── */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 200;
        }

        /* ── SIDE MENU ── */
        .side-menu {
            position: fixed;
            top: 0; right: -320px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 300;
            box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .side-menu.open { right: 0; }

        .side-menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: #003082;
            color: white;
        }

        .side-menu-header .username {
            font-size: 18px;
            font-weight: bold;
        }

        .side-menu-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .side-menu-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #7ec8e3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #003082;
            margin-bottom: 8px;
        }

        .side-menu-user-info {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .side-menu-user-info .display-name {
            font-size: 16px;
            font-weight: bold;
            color: #003082;
        }

        .side-menu a, .side-menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            color: #003082;
            font-weight: bold;
            text-decoration: none;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-family: Arial;
            font-size: 15px;
            border-bottom: 1px solid #f0f0f0;
            box-sizing: border-box;
            transition: background 0.2s;
        }

        .side-menu a:hover, .side-menu-btn:hover { background: #f0f4ff; }

        .side-menu .logout-item {
            color: #820000;
            border-bottom: none;
            margin-top: auto;
        }

        .side-menu .menu-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .container {
            width: 70%;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background: rgb(176, 210, 225);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 10px;
        }

        input[type="text"], input[type="password"], input[type="email"], textarea {
            width: 95%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .settings-box {
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .settings-box h2 { color: #003082; margin-bottom: 20px; }

        .settings-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #003082;
            padding-bottom: 15px;
        }

        .settings-section h4 { color: #003082; margin-bottom: 10px; }

        .settings-section select, .settings-section input {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #003082;
        }

        .toggle-switch { display: flex; align-items: center; gap: 10px; }

        .save-btn {
            background: #b4cbff;
            color: #003082;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        .btn {
            background: #7ec8e3 !important;
            color: #003082 !important;
            padding: 8px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Auth links for non-logged in */
        .auth-links a {
            margin-left: 15px;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            font-size: 16px;
        }

        .auth-links .btn {
            background: #7ec8e3 !important;
            color: #003082 !important;
            padding: 8px 14px;
            border-radius: 20px;
        }
    </style>

    <script>
        (function() {
            function getCookie(name) {
                const value = '; ' + document.cookie;
                const parts = value.split('; ' + name + '=');
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            }
            const theme = getCookie('theme');
            if (theme === 'dark') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.add('dark');
                });
            }
        })();
    </script>
</head>

<body>

<div class="overlay" id="overlay" onclick="closeSideMenu()"></div>

<div class="navbar">
    <a href="{% url 'home' %}" class="logo">
        <img src="{% static 'images/logo.jpg' %}" alt="Iramora" style="height:45px; width:auto;">
        <span>Iramora</span>
    </a>

    <div class="nav-links">
        {% if user.is_authenticated %}
            <div class="hamburger" onclick="openSideMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
        {% else %}
            <div class="auth-links">
                <a href="{% url 'account_login' %}">Login</a>
                <a class="btn" href="{% url 'register' %}">Join Now</a>
            </div>
        {% endif %}
    </div>
</div>

{% if user.is_authenticated %}
<div class="side-menu" id="side-menu">
    <div style="background:#003082; padding:20px; display:flex; align-items:center; justify-content:space-between;">
        <span style="color:white; font-size:18px; font-weight:bold;">Menu</span>
        <button class="side-menu-close" onclick="closeSideMenu()">✕</button>
    </div>

    <div class="side-menu-user-info">
        <div class="side-menu-avatar">{{ user.username|first|upper }}</div>
        <div class="display-name">{{ user.username }}</div>
        <div style="font-size:13px; color:#666; margin-top:4px;">{{ user.email }}</div>
    </div>

    <a href="{% url 'profile' user.username %}">
        <span class="menu-icon">👤</span> My Profile
    </a>
    <a href="{% url 'settings' %}">
        <span class="menu-icon">⚙️</span> Settings
    </a>
    <form action="{% url 'logout' %}" method="post" style="margin:0; padding:0;">
        {% csrf_token %}
        <button type="submit" class="side-menu-btn logout-item">
            <span class="menu-icon">🚪</span> Logout
        </button>
    </form>
</div>
{% endif %}

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script>
    function openSideMenu() {
        document.getElementById('side-menu').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeSideMenu() {
        document.getElementById('side-menu').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
        document.body.style.overflow = '';
    }
</script>

</body>
</html>
