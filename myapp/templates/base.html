{% load static %}
<!DOCTYPE html>
<html id="html-root">
<head>
    <title>Iramora</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fefefe;
            color: #1e3a5f;
        }

        body.dark {
            background: #1a2a3a !important;
            color: #d0e8f5 !important;
        }

        body.dark .navbar {
            background: #0f1f2e !important;
            border-bottom: 1px solid #0a1520 !important;
        }

        body.dark .logo {
            color: #7ec8e3 !important;
        }

        body.dark .nav-links a, body.dark .nav-links button {
            color: #7ec8e3 !important;
        }

        body.dark .logout-btn {
            background: #1e3a52 !important;
            color: #7ec8e3 !important;
        }

        body.dark .card {
            background: #1e3448 !important;
            color: #ffffff !important;
            border: 1px solid #0f1f2e !important;
        }

        body.dark .card p,
        body.dark .card span,
        body.dark .card a,
        body.dark .card h1,
        body.dark .card h2,
        body.dark .card h3,
        body.dark .card h4,
        body.dark .card h5,
        body.dark .card small {
            color: #ffffff !important;
        }

        body.dark .user-menu {
            background: #0f1f2e !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
        }

        body.dark .user-menu a, body.dark .user-menu button {
            color: #d0e8f5 !important;
            border-bottom: 1px solid #1a2a3a !important;
        }

        body.dark .user-menu a:hover, body.dark .user-menu button:hover {
            background: #1e3448 !important;
        }

        body.dark .user-menu .logout-item {
            color: #ff6b6b !important;
        }

        body.dark .settings-box {
            background: #1e3448 !important;
            color: #d0e8f5 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
        }

        body.dark .settings-box h2 {
            color: #7ec8e3 !important;
        }

        body.dark .settings-section h4 {
            color: #7ec8e3 !important;
        }

        body.dark .settings-section {
            border-bottom: 1px solid #0f1f2e !important;
        }

        body.dark .save-btn {
            background: #1e3a52 !important;
            color: #7ec8e3 !important;
        }

        body.dark .messages {
            background: #1e3448 !important;
            color: #d0e8f5 !important;
            border-left: 5px solid #7ec8e3 !important;
        }

        body.dark .login-box {
            background: #1e3448 !important;
            color: #d0e8f5 !important;
        }

        body.dark input[type="text"],
        body.dark input[type="password"],
        body.dark input[type="email"],
        body.dark textarea {
            background: #1a2a3a !important;
            color: #d0e8f5 !important;
            border: 1px solid #0f1f2e !important;
        }

        body.dark .container {
            color: #d0e8f5 !important;
        }

        body.dark .btn {
            background: #1e3a52 !important;
            color: #7ec8e3 !important;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background: #003082;
            border-bottom: 1px solid #7ec8e3;
        }

        .logo {
            font-family: sans-serif;
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a, .nav-links button {
            margin-left: 15px;
            text-decoration: none;
            color: #ffffff;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            font-family: Arial;
            font-size: 16px;
        }

        .btn {
            background: #7ec8e3 !important;
            color: #003082 !important;
            padding: 8px 14px;
            border-radius: 20px;
        }

        .logout-btn {
            background: #003082 !important;
            color: #ffffff !important;
            padding: 8px 14px;
            border-radius: 20px;
        }

        .messages {
            list-style: none;
            padding: 10px;
            margin: 10px 0;
            background: #fff;
            border-radius: 5px;
            color: #003082;
            border-left: 5px solid #003082;
        }

        .container {
            width: 70%;
            margin: auto;
            margin-top: 30px;
        }

        .card {
            background: rgb(176, 210, 225);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 10px;
        }

        .login-box {
            width: 400px;
            margin: auto;
            margin-top: 80px;
            background: rgb(87, 163, 193);
            padding: 30px;
            border-radius: 10px;
        }

        input[type="text"], input[type="password"], input[type="email"], textarea {
            width: 95%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .user-dropdown {
            position: relative;
            display: inline-block;
            margin-left: 15px;
        }

        .user-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            min-width: 170px;
            z-index: 999;
            overflow: hidden;
        }

        .user-menu a, .user-menu button {
            display: block;
            width: 100%;
            padding: 12px 16px;
            color: #003082;
            font-weight: bold;
            text-decoration: none;
            border: none;
            background: none;
            text-align: left;
            cursor: pointer;
            font-family: Arial;
            font-size: 15px;
            border-bottom: 1px solid #e0e0e0;
            box-sizing: border-box;
            margin: 0;
        }

        .user-menu a:hover, .user-menu button:hover {
            background: #8aa9ffd7;
        }

        .user-menu .logout-item {
            color: #820000;
            border-bottom: none;
        }

        .settings-box {
            background: #e0e0e0(255, 255, 255, 0.438);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 4px 15px #003082(0,0,0,0.1);
        }

        .settings-box h2 {
            color: #003082;
            margin-bottom: 20px;
        }

        .settings-section {
            margin-bottom: 25px;
            border-bottom: 1px solid #003082;
            padding-bottom: 15px;
        }

        .settings-section h4 {
            color: #003082;
            margin-bottom: 10px;
        }

        .settings-section select, .settings-section input {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #003082;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .save-btn {
            background: #b4cbff;
            color: #003082;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
    </style>

    <script>
        (function() {
            function getCookie(name) {
                const value = '; ' + document.cookie;
                const parts = value.split('; ' + name + '=');
                if (parts.length === 2) return parts.pop().split(';').shift();
                return null;
            }
            const theme = getCookie('theme');
            if (theme === 'dark') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.add('dark');
                });
            }
        })();
    </script>
</head>

<body>

<div class="navbar">
    <a href="{% url 'home' %}" class="logo" style="display:flex; align-items:center; gap:10px;">
        <img src="{% static 'images/logo.jpg' %}" alt="Iramora" style="height:45px; width:auto;">
        <span>Iramora</span>
    </a>

    <div class="nav-links">
        {% if user.is_authenticated %}
            <div class="user-dropdown">
                <button onclick="toggleMenu()" class="logout-btn" style="cursor: pointer;">
                    {{ user.username }} ▾
                </button>
                <div class="user-menu" id="user-menu">
                    <a href="{% url 'profile' user.username %}">My Profile</a>
                    <a href="{% url 'settings' %}">Settings</a>
                    <form action="{% url 'logout' %}" method="post" style="margin: 0; padding: 0;">
                        {% csrf_token %}
                        <button type="submit" class="logout-item">Logout</button>
                    </form>
                </div>
            </div>
        {% else %}
            <a href="{% url 'account_login' %}">Login</a>
            <a class="btn" href="{% url 'register' %}">Join Now</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<script>
    function toggleMenu() {
        const menu = document.getElementById('user-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    document.addEventListener('click', function(e) {
        const dropdown = document.querySelector('.user-dropdown');
        if (dropdown && !dropdown.contains(e.target)) {
            document.getElementById('user-menu').style.display = 'none';
        }
    });
</script>

</body>
</html>
