{% extends 'base.html' %}
{% block content %}

<style>
    .diary-form-wrapper {
        max-width: 600px;
        margin: 30px auto;
    }

    .diary-form-title {
        font-size: 24px;
        font-weight: bold;
        color: #003082;
        margin-bottom: 20px;
    }

    .diary-form-card {
        background: white;
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 2px 12px rgba(0,48,130,0.08);
    }

    .diary-form-card label {
        display: block;
        font-weight: bold;
        color: #003082;
        margin-bottom: 6px;
        font-size: 14px;
    }

    .diary-form-card input[type="text"],
    .diary-form-card textarea,
    .diary-form-card select {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        color: #333;
        margin-bottom: 18px;
        box-sizing: border-box;
        font-family: Arial;
    }

    .diary-form-card textarea {
        height: 200px;
        resize: vertical;
    }

    .diary-form-card input:focus,
    .diary-form-card textarea:focus,
    .diary-form-card select:focus {
        outline: none;
        border-color: #003082;
    }

    .diary-form-actions {
        display: flex;
        gap: 10px;
    }

    .btn-save {
        background: #003082;
        color: white;
        padding: 11px 28px;
        border: none;
        border-radius: 20px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
    }

    .btn-save:hover { background: #001f52; }

    .btn-cancel {
        background: #e8f0ff;
        color: #003082;
        padding: 11px 28px;
        border-radius: 20px;
        font-size: 15px;
        font-weight: bold;
        text-decoration: none;
        transition: background 0.2s;
    }

    .btn-cancel:hover { background: #c8d8ff; }

    body.dark .diary-form-card { background: #1e3448 !important; }
    body.dark .diary-form-card label { color: #7ec8e3 !important; }
    body.dark .diary-form-card input,
    body.dark .diary-form-card textarea,
    body.dark .diary-form-card select {
        background: #1a2a3a !important;
        color: #d0e8f5 !important;
        border-color: #0f1f2e !important;
    }
    body.dark .diary-form-title { color: #7ec8e3 !important; }
</style>

<div class="diary-form-wrapper">
    <div class="diary-form-title">{{ action }} Entry</div>

    <div class="diary-form-card">
        <form method="post">
            {% csrf_token %}

            <label>Title (optional)</label>
            <input type="text" name="title" value="{{ entry.title|default:'' }}" placeholder="Give your entry a title...">

            <label>How are you feeling?</label>
            <select name="mood">
                <option value="">-- Select mood --</option>
                <option value="happy" {% if entry.mood == 'happy' %}selected{% endif %}>😊 Happy</option>
                <option value="sad" {% if entry.mood == 'sad' %}selected{% endif %}>😢 Sad</option>
                <option value="angry" {% if entry.mood == 'angry' %}selected{% endif %}>😠 Angry</option>
                <option value="anxious" {% if entry.mood == 'anxious' %}selected{% endif %}>😰 Anxious</option>
                <option value="calm" {% if entry.mood == 'calm' %}selected{% endif %}>😌 Calm</option>
                <option value="excited" {% if entry.mood == 'excited' %}selected{% endif %}>🤩 Excited</option>
                <option value="tired" {% if entry.mood == 'tired' %}selected{% endif %}>😴 Tired</option>
                <option value="neutral" {% if entry.mood == 'neutral' %}selected{% endif %}>😐 Neutral</option>
            </select>

            <label>Write your thoughts...</label>
            <textarea name="content" placeholder="What's on your mind today?" required>{{ entry.content|default:'' }}</textarea>

            <div class="diary-form-actions">
                <button type="submit" class="btn-save">Save</button>
                <a href="{% url 'diary' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
