{% extends 'base.html' %}
{% block content %}

<div class="login-box">
    <h2 style="color:#003082; text-align:center;">Forgot Password</h2>
    <p style="color:#003082; text-align:center;">Enter your email and we'll send you a reset link.</p>

    <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Enter your email" required>
        <button type="submit" class="btn" style="width:100%; padding:10px; cursor:pointer;">Send Reset Link</button>
    </form>
</div>

{% endblock %}
