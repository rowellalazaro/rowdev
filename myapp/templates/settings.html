{% extends 'base.html' %}
{% block content %}

<div class="settings-box">
    <h2>Settings</h2>

    <div class="settings-section">
        <h4>🌙 Theme</h4>
        <div class="toggle-switch">
            <label>
                <input type="radio" name="theme" value="light" id="light-mode"> Light Mode
            </label>
            <label>
                <input type="radio" name="theme" value="dark" id="dark-mode"> Dark Mode
            </label>
        </div>
    </div>

    <div class="settings-section">
        <h4>👤 Account</h4>
        <a href="{% url 'account_change_password' %}" class="save-btn" style="text-decoration:none; display:inline-block; margin-bottom:10px;">Change Password</a>
        <br><br>
        <a href="{% url 'account_email' %}" class="save-btn" style="text-decoration:none; display:inline-block;">Change Email</a>
    </div>

    <button onclick="saveSettings()" class="save-btn">Save Settings</button>
</div>

<script>
    function getCookie(name) {
        const value = '; ' + document.cookie;
        const parts = value.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    const currentTheme = getCookie('theme') || 'light';
    document.getElementById(currentTheme + '-mode').checked = true;

    document.querySelectorAll('input[name="theme"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            if (this.value === 'dark') {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        });
    });

    function saveSettings() {
        const theme = document.querySelector('input[name="theme"]:checked').value;
        document.cookie = 'theme=' + theme + '; path=/; max-age=31536000';
        window.location.href = '/';
    }
</script>

{% endblock %}
