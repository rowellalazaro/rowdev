{% extends 'base.html' %}
{% block content %}

<div class="settings-box">
    <h2>Settings</h2>

    <div class="settings-section">
        <h4>Theme</h4>
        <div style="display:flex; align-items:center; gap:10px;">
            <span>Light</span>
            <label style="position:relative; display:inline-block; width:52px; height:28px;">
                <input type="checkbox" id="theme-toggle" style="opacity:0; width:0; height:0;">
                <span style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#b4cbff; border-radius:28px; transition:0.3s;">
                    <span id="toggle-knob" style="position:absolute; height:22px; width:22px; left:3px; bottom:3px; background:white; border-radius:50%; transition:0.3s;"></span>
                </span>
            </label>
            <span>Dark</span>
        </div>
    </div>

    <div class="settings-section">
        <h4 onclick="toggleSection('account-options', this)" 
            style="cursor:pointer; padding:8px; border-radius:8px; transition:0.2s;"
            onmouseover="this.style.background='#e8f0ff';"
            onmouseout="this.style.background='';">
            👤 Account
        </h4>
        <div id="account-options" style="display:none; padding:10px 0;">
            <a href="{% url 'account_change_password' %}" class="save-btn" style="text-decoration:none; display:block; margin-bottom:10px; text-align:center;">Change Password</a>
            <br>
            <a href="{% url 'account_email' %}" class="save-btn" style="text-decoration:none; display:block; text-align:center;">Change Email</a>
        </div>
    </div>

    <div class="settings-section">
        <h4 onclick="toggleSection('about-options', this)"
            style="cursor:pointer; padding:8px; border-radius:8px; transition:0.2s;"
            onmouseover="this.style.background='#e8f0ff';"
            onmouseout="this.style.background='';">
            ℹ️ About
        </h4>
        <div id="about-options" style="display:none; padding:10px 0;">
            <p style="margin:5px 0;"><strong>Site:</strong> RowDev</p>
            <p style="margin:5px 0;"><strong>Developer:</strong> Rowella Lazaro</p>
            <p style="margin:5px 0;"><strong>Description:</strong> A personal blog and social platform for sharing posts and ideas.</p>
            <p style="margin:5px 0;"><strong>Version:</strong> 1.0.0</p>
        </div>
    </div>

    <div style="margin-top:20px; text-align:left;">
        <a href="{% url 'home' %}" style="text-decoration:none; color:#003082; font-weight:bold; font-size:15px;">Back to Dashboard</a>
    </div>

</div>

<script>
    function getCookie(name) {
        const value = '; ' + document.cookie;
        const parts = value.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    const currentTheme = getCookie('theme') || 'light';
    const toggle = document.getElementById('theme-toggle');
    const knob = document.getElementById('toggle-knob');

    function updateToggleStyle(isDark) {
        if (isDark) {
            knob.style.transform = 'translateX(24px)';
            toggle.parentElement.querySelector('span').style.background = '#003082';
        } else {
            knob.style.transform = 'translateX(0)';
            toggle.parentElement.querySelector('span').style.background = '#b4cbff';
        }
    }

    toggle.checked = currentTheme === 'dark';
    updateToggleStyle(currentTheme === 'dark');

    toggle.addEventListener('change', function() {
        const isDark = this.checked;
        updateToggleStyle(isDark);
        if (isDark) {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        const theme = isDark ? 'dark' : 'light';
        document.cookie = 'theme=' + theme + '; path=/; max-age=31536000';
    });

    function toggleSection(id, header) {
        const options = document.getElementById(id);
        if (options.style.display === 'none') {
            options.style.display = 'block';
            header.style.background = '#d0e4ff';
        } else {
            options.style.display = 'none';
            header.style.background = '';
        }
    }
</script>

{% endblock %}
