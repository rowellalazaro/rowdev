{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
    .settings-wrapper {
        max-width: 500px;
        margin: 30px auto;
    }

    .settings-back {
        font-size: 13px;
        color: #001f52;
        font-weight: bold;
        text-decoration: underline;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 15px;
    }

    .settings-back:hover { color: #003082; }

    .settings-title {
        font-size: 22px;
        font-weight: bold;
        color: #001f52;
        margin-bottom: 15px;
    }

    .settings-card {
        background: #ffffff;
        border: 2px solid #001f52;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 12px;
        box-sizing: border-box;
    }

    .settings-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid #001f52;
        cursor: pointer;
        transition: background 0.2s;
    }

    .settings-row:last-child { border-bottom: none; }
    .settings-row:hover { background: #fafbff; }

    .settings-row-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .settings-row-icon {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        background: #e8f0ff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
    }

    .settings-row-label {
        font-size: 14px;
        font-weight: bold;
        color: #001f52;
    }

    .settings-row-sub {
        font-size: 12px;
        color: #666;
        margin-top: 1px;
    }

    .settings-row-arrow { 
        color: #001f52; 
        font-size: 18px; 
        font-weight: bold;
    }

    .settings-expandable {
        display: none;
        padding: 14px 18px 14px 62px;
        border-bottom: 1px solid #001f52;
        background: #fafbff;
    }

    .settings-expandable.open { display: block; }

    .settings-expandable a, .settings-expandable-link {
        display: inline-block;
        background: #99afc4;
        color: #003082;
        padding: 6px 12px;
        border-radius: 15px;
        font-weight: bold;
        font-size: 12px;
        text-decoration: none;
        margin: 4px 4px 0 0;
        transition: background 0.2s;
    }

    .settings-expandable a:hover { background: #c8d8ff; }

    .settings-expandable p {
        font-size: 13px;
        color: #333;
        margin: 6px 0;
    }

    .settings-expandable strong { color: #001f52; }

    /* Theme toggle row configuration */
    .theme-toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
    }

    .theme-toggle-left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .toggle-track {
        position: relative;
        width: 46px;
        height: 24px;
        display: inline-block;
    }

    .toggle-track input {
        opacity: 0; width: 0; height: 0;
        position: absolute;
        margin: 0;
    }

    .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #b4cbff;
        border-radius: 24px;
        transition: 0.3s;
    }

    .toggle-slider:before {
        content: '';
        position: absolute;
        height: 18px; width: 18px;
        left: 3px; bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
    }

    input:checked + .toggle-slider { background: #001f52; }
    input:checked + .toggle-slider:before { transform: translateX(22px); }

    .toggle-label { font-size: 13px; color: #666; font-weight: bold; }

    /* About identity block styling */
    .about-logo-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 10px;
    }

    .about-logo-row img {
        height: 40px;
        width: auto;
        border-radius: 8px;
    }

    .about-logo-row .site-name {
        font-size: 18px;
        font-weight: bold;
        color: #001f52;
    }

    /* Dark Mode Theme Rules override fallback elements safely */
    body.dark .settings-card { background: #1e3448 !important; border-color: #7ec8e3 !important; }
    body.dark .settings-row:hover { background: #1a2f45 !important; }
    body.dark .settings-row { border-bottom-color: #0f1f2e !important; }
    body.dark .settings-row-label { color: #d0e8f5 !important; }
    body.dark .settings-row-sub { color: #7ec8e3 !important; }
    body.dark .settings-expandable { background: #162535 !important; border-bottom-color: #0f1f2e !important; }
    body.dark .settings-expandable p { color: #d0e8f5 !important; }
    body.dark .settings-expandable strong { color: #7ec8e3 !important; }
    body.dark .settings-row-icon { background: #1a2f45 !important; }
    body.dark .settings-back { color: #7ec8e3 !important; }
    body.dark .settings-title { color: #7ec8e3 !important; }
    body.dark .settings-row-arrow { color: #7ec8e3 !important; }
    body.dark .about-logo-row .site-name { color: #7ec8e3 !important; }
</style>

<div class="settings-wrapper">
    <a href="{% url 'home' %}" class="settings-back">Back to Dashboard</a>
    <div class="settings-title">Settings</div>

    <div class="settings-card">
        <div class="theme-toggle-row">
            <div class="theme-toggle-left">
                <div>
                    <div class="settings-row-label">Theme</div>
                    <div class="settings-row-sub">Light / Dark mode</div>
                </div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="toggle-label">Light</span>
                <label class="toggle-track">
                    <input type="checkbox" id="theme-toggle">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">Dark</span>
            </div>
        </div>
    </div>

    <div class="settings-card">
        <div class="settings-row" onclick="toggleExpand('account-expand', this)">
            <div class="settings-row-left">
                <div class="settings-row-icon">👤</div>
                <div>
                    <div class="settings-row-label">Account</div>
                    <div class="settings-row-sub">Password, email</div>
                </div>
            </div>
            <span class="settings-row-arrow">›</span>
        </div>
        <div class="settings-expandable" id="account-expand">
            <a href="{% url 'account_change_password' %}">Change Password</a>
            <a href="{% url 'account_email' %}">Change Email</a>
        </div>
    </div>

    <div class="settings-card">
        <div class="settings-row" onclick="toggleExpand('help-expand', this)">
            <div class="settings-row-left">
                <div class="settings-row-icon">🛠️</div>
                <div>
                    <div class="settings-row-label">Help Centre</div>
                    <div class="settings-row-sub">Admin requests, support</div>
                </div>
            </div>
            <span class="settings-row-arrow">›</span>
        </div>
        <div class="settings-expandable" id="help-expand">
            <p>Need help or want to request a change?</p>
            <a href="{% url 'user_request' %}">Request to Admin</a>
        </div>
    </div>
</div>

<script>
    function getCookie(name) {
        const value = '; ' + document.cookie;
        const parts = value.split('; ' + name + '=');
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    const currentTheme = getCookie('theme') || 'light';
    const toggle = document.getElementById('theme-toggle');
    toggle.checked = currentTheme === 'dark';

    toggle.addEventListener('change', function() {
        const isDark = this.checked;
        if (isDark) {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
        document.cookie = 'theme=' + (isDark ? 'dark' : 'light') + '; path=/; max-age=31536000';
    });

    function toggleExpand(id, row) {
        const panel = document.getElementById(id);
        const arrow = row.querySelector('.settings-row-arrow');
        const isOpen = panel.classList.contains('open');
        panel.classList.toggle('open');
        arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
        arrow.style.transition = '0.2s';
    }
</script>

{% endblock %}
