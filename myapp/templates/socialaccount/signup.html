{% extends "base.html" %}

{% block content %}

<style>
.confirm-container{
    width:100%;
    max-width:430px;
    margin:70px auto;
    background:white;
    padding:40px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
    text-align:center;
    box-sizing:border-box;
}

.google-logo{
    width:70px;
    height:70px;
    margin:0 auto 20px;
    border-radius:50%;
    background:#003082;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

.confirm-container h1{
    font-size:30px;
    color:#003082;
    margin-bottom:10px;
}

.confirm-container p{
    color:#555;
    margin-bottom:25px;
    font-size:15px;
}

.confirm-container form p{
    margin:0;
}

.confirm-container label{
    display:block;
    text-align:left;
    margin-bottom:6px;
    margin-top:12px;
    color:#003082;
    font-weight:600;
}

.confirm-container input{
    width:100%;
    padding:14px;
    border:1px solid #dcdcdc;
    border-radius:10px;
    margin-bottom:14px;
    box-sizing:border-box;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

.confirm-container input:focus{
    border-color:#003082;
    box-shadow:0 0 0 3px rgba(0,48,130,0.15);
}

.btn-continue{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#003082;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn-continue:hover{
    background:#001f52;
    transform:translateY(-2px);
}
</style>

<div class="confirm-container">

    <div class="google-logo">
        G
    </div>

    <h1>Almost Done!</h1>

    <p>
        Complete your profile to finish signing in with Google.
    </p>

    <form method="post" action="{% url 'socialaccount_signup' %}">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-continue">
            Continue mo
        </button>
    </form>

</div>

{% endblock %}
